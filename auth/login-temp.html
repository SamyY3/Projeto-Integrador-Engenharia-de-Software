<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="../" data-app-base>
  <script>(function(){var p=location.pathname.replace(/\\/g,"/"),b=document.querySelector("base[data-app-base]"),m=p.match(/^(.*\/)(?:auth|admin|pages|mapa)\/[^/]+$/);if(b)b.href=m?m[1]:p.replace(/\/[^/]*$/,"/")||"/";})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Temporário Desativado</title>
  <meta http-equiv="refresh" content="0; url=login.html">
</head>
<body>
  <p>Esta página temporária foi desativada por segurança. <a href="auth/login.html">Ir para o login</a>.</p>
  <script>
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    window.location.replace('login.html');
  </script>
</body>
</html>
