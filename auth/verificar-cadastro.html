<!DOCTYPE html>
<html lang="pt-br" class="auth-view">
<head>
  <base href="../" data-app-base>
  <script>(function(){var p=location.pathname.replace(/\\/g,"/"),b=document.querySelector("base[data-app-base]"),m=p.match(/^(.*\/)(?:auth|admin|pages|mapa)\/[^/]+$/);if(b)b.href=m?m[1]:p.replace(/\/[^/]*$/,"/")||"/";})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmar Cadastro - EcoColeta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/auth-background.css?v=3">
  <link rel="stylesheet" href="assets/css/logo.css?v=19">
  <link rel="stylesheet" href="assets/css/auth-screens.css?v=4">
  <style>
    .auth .container {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin: 0 auto;
      display: block;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
    }

    .auth .container h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1E3A8A;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth .container .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .text {
      color: #475569;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
      font-weight: 400;
    }

    .text strong {
      color: #1E3A8A;
      font-weight: 600;
    }

    .codigo {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 32px 0;
      flex-wrap: wrap;
    }

    .code-digit {
      width: 50px;
      height: 56px;
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.8);
      color: #1E3A8A;
    }

    .code-digit::placeholder {
      color: #cbd5e1;
    }

    .code-digit:focus {
      outline: none;
      border-color: #2E7D32;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
      transform: scale(1.05);
    }

    .code-digit:hover:not(:focus) {
      border-color: #cbd5e1;
    }

    .field-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: block;
      min-height: 20px;
      font-weight: 500;
    }

    .field-success {
      color: #15803d;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
      display: block;
      min-height: 20px;
      font-weight: 500;
    }

    .tempo {
      color: #64748b;
      font-size: 13px;
      margin: 16px 0;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-verde {
      background: linear-gradient(135deg, #8FFFC7 0%, #7fd9b5 100%);
      color: #0f2c21;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(143, 255, 199, 0.3);
      margin-top: 24px;
    }

    .btn-verde:hover {
      box-shadow: 0 8px 25px rgba(143, 255, 199, 0.4);
    }

    .reenviar {
      color: #475569;
      font-size: 13px;
      margin-top: 20px;
      font-weight: 400;
    }

    .reenviar-link {
      color: #2E7D32;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .reenviar-link:hover:not(.disabled) {
      color: #1B5E20;
      text-decoration: underline;
    }

    .reenviar-link.disabled {
      color: #cbd5e1;
      cursor: default;
      opacity: 0.6;
    }

    .voltar {
      display: inline-block;
      margin-top: 14px;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .voltar:hover {
      color: #1E3A8A;
      text-decoration: underline;
    }

    html.auth-view,
    html:has(body.auth) {
      height: auto;
      max-height: none;
      overflow: auto;
    }

    body.auth.verificar-cadastro > .container {
      max-height: none;
      overflow: visible;
      display: block;
      width: 100%;
      max-width: 420px;
      padding: 28px 28px 26px;
    }

    body.auth.verificar-cadastro .container h2 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    body.auth.verificar-cadastro .container .subtitle {
      margin-bottom: 14px;
      font-size: 13px;
    }

    body.auth.verificar-cadastro .text {
      margin-bottom: 18px;
      font-size: 13px;
    }

    body.auth.verificar-cadastro .codigo {
      margin: 18px 0 8px;
      gap: 10px;
      flex-wrap: nowrap;
    }

    body.auth.verificar-cadastro .code-digit {
      width: 44px;
      height: 50px;
      font-size: 22px;
      flex: 0 0 auto;
    }

    body.auth.verificar-cadastro .field-error:empty,
    body.auth.verificar-cadastro .field-success:empty {
      min-height: 0;
      margin-top: 0;
    }

    body.auth.verificar-cadastro #codeSuccess:not(:empty) {
      display: block;
      margin: 12px 0 4px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #ecfdf5;
      border: 1px solid #86efac;
      color: #166534;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
    }

    body.auth.verificar-cadastro .tempo {
      margin: 10px 0;
      font-size: 12px;
    }

    body.auth.verificar-cadastro .container > button.btn-verde {
      margin-top: 14px;
    }

    body.auth.verificar-cadastro .reenviar {
      margin-top: 14px;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      body.auth.verificar-cadastro > .container {
        padding: 24px 20px 22px;
      }

      body.auth.verificar-cadastro .codigo {
        gap: 6px;
      }

      body.auth.verificar-cadastro .code-digit {
        width: 38px;
        height: 46px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body class="auth verificar-cadastro">

  <div class="eco-login-bg" aria-hidden="true">
    <span class="eco-bin eco-bin--1"></span>
    <span class="eco-bin eco-bin--2"></span>
    <span class="eco-bin eco-bin--3"></span>
    <span class="eco-bin eco-bin--4"></span>
    <span class="eco-bin eco-bin--5"></span>
    <span class="eco-bin eco-bin--6"></span>
    <span class="eco-bin eco-bin--7"></span>
    <span class="eco-bin eco-bin--8"></span>
  </div>

  <a href="pages/tela-inicia.html" class="auth-brand" aria-label="EcoColeta — início">
    <img class="auth-logo-img" src="assets/images/logo.2.png?v=5" alt="EcoColeta" width="196" height="82" decoding="async">
  </a>

  <div class="container">
    <h2>Confirmar Cadastro</h2>
    <p class="subtitle">Digite o c?digo de 6 d?gitos que enviamos por e-mail</p>

    <p class="text">
      Enviamos um c?digo para <br>
      <strong id="signupEmailDisplay"></strong>
    </p>

    <div class="codigo">
      <input class="code-digit" id="digit1" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit2" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit3" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit4" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit5" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
      <input class="code-digit" id="digit6" type="text" maxlength="1" inputmode="numeric" autocomplete="one-time-code" placeholder="0">
    </div>
    <span class="field-error" id="codeError"></span>
    <span class="field-success" id="codeSuccess"></span>

    <p class="tempo" id="countdownText">Aguarde 51 segundos para reenviar.</p>

    <button class="btn-verde" type="button" onclick="verificarCodigoCadastro()">Confirmar cadastro</button>

    <p class="reenviar">
      N?o recebeu o c?digo?
      <span class="reenviar-link disabled" id="resendLink" onclick="reenviarCodigoCadastro()">Reenviar agora</span>
    </p>

    <span class="voltar" onclick="window.location.href='cadastro.html'">&larr; Voltar para o cadastro</span>
  </div>

  <script src="assets/js/ecocoleta-paths.js?v=6"></script>
  <script>
    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function obterUrlServidor(arquivoPhp) {
      return window.ecocoletaPhpUrl ? window.ecocoletaPhpUrl(arquivoPhp) : null;
    }

    function parseJsonServidor(text) {
      const raw = String(text || '').replace(/^\uFEFF/, '').trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e1) {
        const marcas = ['{"sucesso"', '{"erro"', '{"detalhe"', '{"mensagem"', '{"codigo_para_teste"'];
        let idx = -1;
        for (const m of marcas) {
          const i = raw.indexOf(m);
          if (i >= 0 && (idx < 0 || i < idx)) idx = i;
        }
        if (idx < 0) throw e1;
        let depth = 0;
        for (let i = idx; i < raw.length; i++) {
          const c = raw[i];
          if (c === '{') depth++;
          else if (c === '}') {
            depth--;
            if (depth === 0) return JSON.parse(raw.slice(idx, i + 1));
          }
        }
        throw e1;
      }
    }

    async function postFormJson(arquivoPhp, campos) {
      const url = obterUrlServidor(arquivoPhp);
      if (!url) throw new Error('FILE_PROTOCOL');
      const body = new URLSearchParams(campos);
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: body.toString(),
        credentials: 'same-origin',
        cache: 'no-store',
      });
      const text = await res.text();
      let data;
      try {
        data = parseJsonServidor(text);
      } catch (e) {
        const limpo = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 350);
        throw new Error('BAD_RESPONSE:' + (limpo || ('HTTP ' + res.status)));
      }
      return { res, data };
    }

    function limparMsgs() {
      setText('codeError', '');
      setText('codeSuccess', '');
    }

    async function verificarCodigoCadastro() {
      limparMsgs();
      const digits = Array.from(document.querySelectorAll('.code-digit')).map((i) => i.value.trim());
      const codigo = digits.join('');
      const email = sessionStorage.getItem('signupEmail');

      if (!email) {
        window.location.href = 'cadastro.html';
        return;
      }

      if (codigo.length !== 6) {
        setText('codeError', 'Digite o c?digo completo (6 n?meros).');
        return;
      }

      try {
        const { data } = await postFormJson('verificar_cadastro.php', {
          acao: 'verificar',
          email: email,
          codigo: codigo,
        });
        if (data && data.sucesso === true) {
          setText('codeSuccess', 'Conta confirmada! Redirecionando para o login...');
          sessionStorage.removeItem('signupEmail');
          sessionStorage.removeItem('signupCodigoTeste');
          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            const loginParams = new URLSearchParams({ registered: '1', email: email });
            if (redirect) {
              loginParams.set('redirect', redirect);
            }
            window.location.href = 'login.html?' + loginParams.toString();
          }, 900);
          return;
        }
        setText('codeError', (data && data.erro) ? data.erro : 'N?o foi poss?vel confirmar o c?digo.');
      } catch (e) {
        if (e && e.message === 'FILE_PROTOCOL') {
          setText('codeError', 'Abra pelo servidor: http://localhost/Ecocoleta/auth/verificar-cadastro.html');
          return;
        }
        if (e && String(e.message).startsWith('BAD_RESPONSE:')) {
          setText('codeError', 'Resposta inv?lida do servidor. Confira Apache/MySQL.');
          return;
        }
        setText('codeError', 'Sem conex?o com o servidor. Confira se Apache e MySQL est?o ligados.');
      }
    }

    let resendTimer = null;
    let resendAllowed = false;

    function setResendState(allowed) {
      const link = document.getElementById('resendLink');
      if (!link) return;
      resendAllowed = allowed;
      if (allowed) {
        link.classList.remove('disabled');
      } else {
        link.classList.add('disabled');
      }
    }

    function updateCountdownText(seconds) {
      const el = document.getElementById('countdownText');
      if (!el) return;
      if (seconds > 0) {
        el.textContent = 'Aguarde ' + seconds + ' segundo' + (seconds === 1 ? '' : 's') + ' para reenviar.';
      } else {
        el.textContent = 'Voc? pode reenviar o c?digo agora.';
      }
    }

    function startResendCountdown(duration) {
      let remaining = duration;
      setResendState(false);
      updateCountdownText(remaining);
      if (resendTimer) clearInterval(resendTimer);
      resendTimer = setInterval(() => {
        remaining -= 1;
        updateCountdownText(remaining);
        if (remaining <= 0) {
          clearInterval(resendTimer);
          resendTimer = null;
          setResendState(true);
        }
      }, 1000);
    }

    async function reenviarCodigoCadastro() {
      limparMsgs();
      const email = sessionStorage.getItem('signupEmail');
      if (!email) {
        window.location.href = 'cadastro.html';
        return;
      }
      if (!resendAllowed) {
        setText('codeError', 'Aguarde o tempo de reenviar terminar.');
        return;
      }
      try {
        const { data } = await postFormJson('verificar_cadastro.php', {
          acao: 'reenviar',
          email: email,
        });
        if (data && data.sucesso === true) {
          setText('codeSuccess', data.mensagem || 'Novo c?digo enviado.');
          if (data.codigo_para_teste) {
            alert('Modo local (sem envio de e-mail): seu novo c?digo ? ' + data.codigo_para_teste);
          }
          startResendCountdown(51);
          return;
        }
        setText('codeError', (data && data.erro) ? data.erro : 'N?o foi poss?vel reenviar.');
      } catch (e) {
        setText('codeError', 'Falha ao reenviar. Verifique Apache e o servidor SMTP.');
      }
    }

    function setupCodeInputs() {
      const inputs = Array.from(document.querySelectorAll('.code-digit'));
      inputs.forEach((input, index) => {
        input.addEventListener('input', (event) => {
          const value = event.target.value.replace(/[^0-9]/g, '');
          event.target.value = value;
          if (value && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });
        input.addEventListener('keydown', (event) => {
          if (event.key === 'Backspace' && !event.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });
        input.addEventListener('paste', (event) => {
          const txt = (event.clipboardData || window.clipboardData).getData('text');
          const digits = String(txt || '').replace(/\D/g, '').slice(0, 6).split('');
          if (digits.length === 0) return;
          event.preventDefault();
          digits.forEach((d, i) => {
            if (inputs[i]) inputs[i].value = d;
          });
          const next = Math.min(digits.length, inputs.length - 1);
          inputs[next].focus();
        });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const emailParam = params.get('email');
      if (emailParam && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailParam)) {
        sessionStorage.setItem('signupEmail', emailParam);
      }

      const email = sessionStorage.getItem('signupEmail');
      if (!email) {
        window.location.href = 'cadastro.html';
        return;
      }
      setText('signupEmailDisplay', email);
      setupCodeInputs();
      startResendCountdown(51);

      const codigoTeste = sessionStorage.getItem('signupCodigoTeste');
      if (codigoTeste) {
        setText(
          'codeSuccess',
          'E-mail nao foi enviado (modo local / SMTP indisponivel). Use este codigo: ' + codigoTeste
        );
        const sub = document.querySelector('.subtitle');
        if (sub) {
          sub.textContent = 'Digite o codigo abaixo (enviado na tela porque o e-mail nao foi disparado)';
        }
      }
    });
  </script>
</body>
</html>
