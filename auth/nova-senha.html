<head>

  <style>
    .auth .container {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      margin: 0 auto;
      display: block;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
    }

    .auth .container h2 {
      font-size: 28px;
      font-weight: 700;
      color: #1E3A8A;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth .container .subtitle,
    .auth .container .descricao {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .auth input {
      width: 100%;
      padding: 14px 16px;
      margin: 0;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      outline: none;
      font-size: 15px;
      font-family: 'Sora', sans-serif;

    .auth input::placeholder {

      font-weight: 400;
    }

      border-color: #2E7D32;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
    }

    .auth input:hover:not(:focus) {
      border-color: #cbd5e1;
    }

    .auth input.input-error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.02);
    }

    .auth input.input-error:focus {
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .password-field {
      position: relative;
      width: 100%;
    }

    button.password-toggle {
      width: 44px !important;
      min-width: 44px !important;
      max-width: 44px !important;
      height: 44px !important;
      margin: 0 !important;
      margin-top: 0 !important;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 3;
      padding: 0 !important;
      background: transparent !important;
      border: none !important;
      color: #1E3A8A !important;
      border-radius: 10px !important;
      cursor: pointer;
      display: inline-flex !important;
      align-items: center;
      justify-content: center;
      box-shadow: none !important;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    button.password-toggle:hover {
      transform: translateY(-50%) !important;
      background: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
    }

    button.password-toggle:active {
      transform: translateY(-50%) !important;
    }

    .auth .password-field input {
      padding-right: 48px !important;
    }

    .field-error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      text-align: left;
      display: block;
      min-height: 18px;
      font-weight: 500;
    }

    button:not(.password-toggle) {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      margin-top: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 15px;
      letter-spacing: 0.3px;
    }

    button:not(.password-toggle):hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(46, 125, 50, 0.2);
    }

    button:not(.password-toggle):active {
      transform: translateY(0);
    }

    .btn-verde {
      background: linear-gradient(135deg, #8FFFC7 0%, #7fd9b5 100%);
      color: #0f2c21;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(143, 255, 199, 0.3);
    }

    .btn-verde:hover {
      box-shadow: 0 8px 25px rgba(143, 255, 199, 0.4);
    }

    .btn-borda {
      background: linear-gradient(135deg, #8FFFC7 0%, #7fd9b5 100%);
      border: none;
      color: #0f2c21;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.9);
      color: #1E3A8A;
      border: 1.5px solid #cbd5e1;
    }

    .btn-borda:hover {
      background: rgba(255, 255, 255, 1);
      border-color: #2E7D32;
      color: #2E7D32;
      box-shadow: 0 4px 15px rgba(46, 125, 50, 0.1);
    }

    @media (max-width: 480px) {
      .auth .container {
        padding: 32px 24px;
        max-width: 100%;
      }

      .auth .container h2 {
        font-size: 24px;
      }

      button:not(.password-toggle) {
        padding: 13px 16px;
        font-size: 14px;
      }

      .auth input {
        padding: 13px 16px;
        font-size: 14px;
      }
    }

    html.auth-view,
    html:has(body.auth) {
      height: auto;
      max-height: none;
      overflow: auto;
    }

    body.auth.nova-senha {
      height: auto;
      min-height: 100vh;
      max-height: none;
      overflow-y: auto;
      padding: 24px 16px;
      gap: 10px;
      justify-content: center;
    }

    body.auth.nova-senha > img.logo {
      width: auto;
      max-width: min(260px, 88vw);
      max-height: min(140px, 22vh);
      margin: 0 auto 4px;
    }

    body.auth.nova-senha > .container {
      max-height: none;
      overflow: visible;
      display: block;
      width: 100%;
      max-width: 440px;
      padding: 28px 32px 26px;
    }

    body.auth.nova-senha .container h2 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    body.auth.nova-senha .container .subtitle,
    body.auth.nova-senha .container .subtitulo,
    body.auth.nova-senha .container .descricao {
      margin-bottom: 18px;
      font-size: 13px;
      color: #64748b;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    body.auth.nova-senha .password-field {
      margin-bottom: 4px;
    }

    body.auth.nova-senha .password-rules {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 14px;
      text-align: left;
    }

    body.auth.nova-senha .password-rules .rule {
      margin-bottom: 0;
      font-size: 12px;
      gap: 6px;
    }

    body.auth.nova-senha .password-rules .rule-icon {
      font-size: 12px;
    }

    body.auth.nova-senha .password-rules .rule-text {
      line-height: 1.25;
    }

    body.auth.nova-senha .field-error {
      text-align: left;
    }

    body.auth.nova-senha .field-error:empty {
      min-height: 0;
      margin-top: 0;
    }

    body.auth.nova-senha .container > button:not(.password-toggle) {
      margin-top: 14px;
    }

    @media (max-width: 480px) {
      body.auth.nova-senha {
        padding: 18px 14px;
      }

      body.auth.nova-senha > .container {
        padding: 24px 22px 22px;
      }

      body.auth.nova-senha > img.logo {
        max-width: min(220px, 84vw);
        max-height: min(120px, 18vh);
      }

      body.auth.nova-senha .password-rules {
        grid-template-columns: 1fr;
      }
    }
  </style>

<body class="auth nova-senha">

  <div class="eco-login-bg" aria-hidden="true">
    <span class="eco-bin eco-bin--1"></span>
    <span class="eco-bin eco-bin--2"></span>
    <span class="eco-bin eco-bin--3"></span>
    <span class="eco-bin eco-bin--4"></span>
    <span class="eco-bin eco-bin--5"></span>
    <span class="eco-bin eco-bin--6"></span>
    <span class="eco-bin eco-bin--7"></span>
    <span class="eco-bin eco-bin--8"></span>
  </div>

  <img class="auth-logo-img" src="assets/images/logo.2.png?v=3" alt="EcoColeta" width="200" height="88" fetchpriority="high" decoding="async">

  <div class="container">

    <h2>Defina sua nova senha</h2>

    <p class="subtitulo">Crie uma nova senha</p>

    <div class="password-field">
      <input id="newPassword" type="password" placeholder="Nova senha" autocomplete="new-password">
      <button type="button" class="password-toggle" data-password-toggle-for="newPassword"></button>
    </div>

    <div class="password-rules" id="passwordRules">
      <div class="rule" data-rule="lowercase">
        <span class="rule-icon"></span>
        <span class="rule-text">Pelo menos 1 letra minúscula</span>
      </div>
      <div class="rule" data-rule="uppercase">
        <span class="rule-icon"></span>
        <span class="rule-text">Pelo menos 1 letra maiúscula</span>
      </div>
      <div class="rule" data-rule="number">
        <span class="rule-icon"></span>
        <span class="rule-text">Pelo menos 1 número</span>
      </div>
      <div class="rule" data-rule="length">
        <span class="rule-icon"></span>
        <span class="rule-text">Mínimo de 8 caracteres</span>
      </div>
      <div class="rule" data-rule="maxlength">
        <span class="rule-icon"></span>
        <span class="rule-text">Máximo de 16 caracteres</span>
      </div>
      <div class="rule" data-rule="nosequential">
        <span class="rule-icon"></span>
        <span class="rule-text">Não pode usar números sequenciais (ex.: 1234)</span>
      </div>
    </div>

    <span class="field-error" id="newPasswordError"></span>

    <button class="btn-verde" id="savePasswordButton" type="button" onclick="saveNewPassword()" disabled>Continuar</button>

  </div>

  <script src="assets/js/ecocoleta-paths.js?v=6"></script>
  <script>
    function obterUrlServidor(arquivoPhp) {
      return window.ecocoletaPhpUrl ? window.ecocoletaPhpUrl(arquivoPhp) : null;
    }

    function parseJsonServidor(text) {
      const raw = String(text || '').replace(/^\uFEFF/, '').trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e1) {
        const marcas = ['{"sucesso"', '{"erro"', '{"detalhe"', '{"mensagem"'];
        let idx = -1;
        for (const m of marcas) {
          const i = raw.indexOf(m);
          if (i >= 0 && (idx < 0 || i < idx)) idx = i;
        }
        if (idx < 0) throw e1;
        let depth = 0;
        for (let i = idx; i < raw.length; i++) {
          const c = raw[i];
          if (c === '{') depth++;
          else if (c === '}') {
            depth--;
            if (depth === 0) return JSON.parse(raw.slice(idx, i + 1));
          }
        }
        throw e1;
      }
    }

    async function postFormJson(arquivoPhp, campos) {
      const url = obterUrlServidor(arquivoPhp);
      if (!url) throw new Error('FILE_PROTOCOL');
      const body = new URLSearchParams(campos);
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
        body: body.toString(),
        credentials: 'same-origin',
        cache: 'no-store',
      });
      const text = await res.text();
      let data;
      try {
        data = parseJsonServidor(text);
      } catch (e) {
        const limpo = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 400);
        throw new Error('BAD_RESPONSE:' + (limpo || ('HTTP ' + res.status)));
      }
      return { res, data };
    }

    function showError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.add('input-error');
      if (error) error.textContent = message;
    }

    function clearErrors() {
      const input = document.getElementById('newPassword');
      if (input) input.classList.remove('input-error');
      const error = document.getElementById('newPasswordError');
      if (error) error.textContent = '';
    }

    async function saveNewPassword() {
      clearErrors();
      const password = document.getElementById('newPassword').value.trim();
      const passwordValid = validatePasswordComplete(password);
      const verified = sessionStorage.getItem('resetVerified');
      const token = sessionStorage.getItem('resetToken');

      if (verified !== 'true' || !token) {
        window.location.href = 'recuperar.html';
        return;
      }

      if (!password) {
        showError('newPassword', 'newPasswordError', 'Digite a nova senha.');
        return;
      }

      if (!passwordValid) {
        showError('newPassword', 'newPasswordError', 'A senha não atende a todos os requisitos.');
        return;
      }

      try {
        const { res, data } = await postFormJson('resetar_senha.php', {
          token: token,
          senha: password,
        });
        if (data.sucesso === true) {
          sessionStorage.removeItem('resetToken');
          sessionStorage.removeItem('resetVerified');
          sessionStorage.removeItem('resetEmail');
          window.location.href = 'senha-criada.html';
          return;
        }
        showError('newPassword', 'newPasswordError', data.erro || ('Erro (' + res.status + ').'));
      } catch (e) {
        showError('newPassword', 'newPasswordError', 'Conexão ou resposta inválida. Verifique Apache e resetar_senha.php.');
      }
    }

    function hasSequentialDigits(password, minRun = 4) {
      const runs = password.match(/\d+/g);
      if (!runs) return false;

      for (const run of runs) {
        if (run.length < minRun) continue;
        for (let i = 0; i <= run.length - minRun; i++) {
          let ascending = true;
          let descending = true;
          for (let j = 0; j < minRun - 1; j++) {
            const a = run.charCodeAt(i + j) - 48;
            const b = run.charCodeAt(i + j + 1) - 48;
            if (b !== a + 1) ascending = false;
            if (b !== a - 1) descending = false;
          }
          if (ascending || descending) return true;
        }
      }
      return false;
    }

    function validatePassword(password) {
      const empty = password === '';
      const rules = {
        lowercase: /[a-z]/.test(password),
        uppercase: /[A-Z]/.test(password),
        number: /\d/.test(password),
        length: password.length >= 8,
        maxlength: !empty && password.length <= 16,
        nosequential: !empty && !hasSequentialDigits(password)
      };

      return rules;
    }

    function validatePasswordComplete(password) {
      const rules = validatePassword(password);
      return Object.values(rules).every(valid => valid);
    }

    function updatePasswordRules() {
      const password = document.getElementById('newPassword').value;
      const rules = validatePassword(password);
      const ruleElements = document.querySelectorAll('#passwordRules .rule');

      ruleElements.forEach(rule => {
        const ruleName = rule.dataset.rule;
        const isValid = rules[ruleName];
        rule.classList.toggle('valid', isValid);
      });

      const isComplete = validatePasswordComplete(password);
      document.getElementById('savePasswordButton').disabled = !isComplete;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const verified = sessionStorage.getItem('resetVerified');
      const token = sessionStorage.getItem('resetToken');
      if (verified !== 'true' || !token) {
        window.location.href = 'recuperar.html';
      }

      document.getElementById('newPassword').addEventListener('input', updatePasswordRules);
    });
  </script>
  <script defer src="assets/js/password-toggle.js?v=1"></script>
</body>
</html>
