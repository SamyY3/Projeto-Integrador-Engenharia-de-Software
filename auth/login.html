  <script>
    function ecocoletaToggleSenha(btn, inputId) {
      var inp = document.getElementById(inputId);
      if (!inp || !btn) return;
      var visible = inp.type !== 'password';
      if (visible) {
        inp.type = 'password';
        btn.classList.remove('is-visible');
        btn.setAttribute('aria-label', 'Mostrar senha');
        btn.setAttribute('title', 'Mostrar senha');
      } else {
        inp.type = 'text';
        btn.classList.add('is-visible');
        btn.setAttribute('aria-label', 'Ocultar senha');
        btn.setAttribute('title', 'Ocultar senha');
      }
    }

    function showError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (input) input.classList.add('input-error');
      if (error) error.textContent = message;
    }

    function clearErrors() {
      ['loginEmail', 'loginPassword'].forEach((id) => {
        const input = document.getElementById(id);
        if (input) input.classList.remove('input-error');
      });
      ['emailError', 'passwordError'].forEach((id) => {
        const error = document.getElementById(id);
        if (error) error.textContent = '';
      });
      clearFormError();
    }

    function showFormError(message) {
      const el = document.getElementById('loginFormError');
      const hint = document.getElementById('cadastroOkHint');
      if (hint) hint.style.display = 'none';
      if (!el) return;
      el.textContent = message;
      el.hidden = !message;
    }

    function clearFormError() {
      const el = document.getElementById('loginFormError');
      if (!el) return;
      el.textContent = '';
      el.hidden = true;
    }

    function redirectAposLogin() {
      const params = new URLSearchParams(window.location.search);
      let redirect = params.get('redirect');
      if (!redirect || /^https?:\/\//i.test(redirect)) {
        window.location.href = window.ecocoletaPageUrl
          ? window.ecocoletaPageUrl('tela-inicia.html')
          : '../pages/tela-inicia.html';
        return;
      }
      const page = redirect.split('?')[0].split('#')[0];
      const suffix = redirect.slice(page.length);
      if (window.ecocoletaPageUrl && /\.html$/i.test(page) && !/^(auth|admin|api|assets)\//i.test(page)) {
        window.location.href = window.ecocoletaPageUrl(page.replace(/^pages\//i, '')) + suffix;
        return;
      }
      const root = window.ecocoletaProjectRoot || '../';
      window.location.href = root + redirect.replace(/^\//, '');
    }

    function obterUrlServidor(arquivoPhp) {
      return window.ecocoletaPhpUrl ? window.ecocoletaPhpUrl(arquivoPhp) : null;
    }

    function obterBaseApp() {
      if (typeof window.ecocoletaAppBaseUrl === 'function') {
        return window.ecocoletaAppBaseUrl();
      }
      return window.location.origin + (window.ecocoletaProjectRoot || '/');
    }

    function parseJsonServidor(text) {
      const raw = String(text || '').replace(/^\uFEFF/, '').trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e1) {
        const marcas = ['{"sucesso"', '{"erro"', '{"detalhe"', '{"usuario"', '{"mensagem"'];
        let idx = -1;
        for (const m of marcas) {
          const i = raw.indexOf(m);
          if (i >= 0 && (idx < 0 || i < idx)) idx = i;
        }
        if (idx < 0) throw e1;
        let depth = 0;
        for (let i = idx; i < raw.length; i++) {
          const c = raw[i];
          if (c === '{') depth++;
          else if (c === '}') {
            depth--;
            if (depth === 0) return JSON.parse(raw.slice(idx, i + 1));
          }
        }
        throw e1;
      }
    }

    async function postFormJson(arquivoPhp, campos) {
      const url = obterUrlServidor(arquivoPhp);
      if (!url) {
        throw new Error('FILE_PROTOCOL');
      }
      const body = new URLSearchParams(campos);
      let res;
      try {
        res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: body.toString(),
          credentials: 'same-origin',
          cache: 'no-store',
        });
      } catch (netErr) {
        const hint = 'Verifique se o Apache está ligado no XAMPP e use ' + obterBaseApp();
        throw new Error('NETWORK:' + hint + ' | URL: ' + url);
      }
      const text = await res.text();
      let data;
      try {
        data = parseJsonServidor(text);
      } catch (e) {
        const limpo = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 350);
        throw new Error('BAD_RESPONSE:' + (limpo || ('HTTP ' + res.status)));
      }
      if (!res.ok && data && data.erro) {
        return { res, data };
      }
      return { res, data };
    }

    async function login() {
      clearErrors();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      let valid = true;
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!email) {
        showError('loginEmail', 'emailError', 'Digite um e-mail.');
        valid = false;
      } else if (!emailPattern.test(email)) {
        showError('loginEmail', 'emailError', 'Digite um e-mail válido.');
        valid = false;
      }

      if (!password) {
        showError('loginPassword', 'passwordError', 'Digite sua senha.');
        valid = false;
      }

      if (!valid) {
        return;
      }

      let ecocheckToken = '';
      if (window.EcoCheck && typeof window.EcoCheck.ensureVerified === 'function') {
        const verified = await window.EcoCheck.ensureVerified();
        if (!verified.ok) {
          showFormError(verified.erro || 'Conclua a verificação EcoCheck.');
          if (window.EcoCheckBridge) window.EcoCheckBridge.updateStatus();
          return;
        }
        ecocheckToken = verified.token || window.EcoCheck.getToken() || '';
      } else {
        showFormError('EcoCheck não carregou. Execute ecocheck/build.bat e recarregue a página.');
        return;
      }

      try {
        const { res, data } = await postFormJson('login.php', {
          email: email,
          senha: password,
          ecocheck_token: ecocheckToken,
        });

        const temErro = data && Object.prototype.hasOwnProperty.call(data, 'erro') && data.erro != null && data.erro !== '';
        const uid = data.usuario && data.usuario.id;
        const okUsuario = data.usuario && typeof data.usuario === 'object'
          && (typeof uid === 'number' || (typeof uid === 'string' && uid !== ''))
          && typeof data.usuario.email === 'string';

        const aceito = data.sucesso === true && !temErro && okUsuario;

        if (aceito) {
          localStorage.setItem('loggedIn', 'true');
          localStorage.setItem('userId', String(data.usuario.id));
          localStorage.setItem('userName', data.usuario.nome);
          localStorage.setItem('userEmail', data.usuario.email);
          redirectAposLogin();
          return;
        }
        localStorage.removeItem('loggedIn');
        localStorage.removeItem('userId');
        localStorage.removeItem('userName');
        localStorage.removeItem('userEmail');
        showFormError(
          (data && data.erro) ? data.erro : 'Não foi possível fazer login. (' + res.status + ')'
        );
      } catch (e) {
        const msg = e && e.message ? String(e.message) : '';
        const base = obterBaseApp();
        if (msg === 'FILE_PROTOCOL') {
          showFormError('Abra pelo servidor: INICIAR-PROJETO.bat ou ' + base + 'auth/login.html (não use file://).');
          return;
        }
        if (msg.startsWith('NETWORK:')) {
          showFormError('Sem conexão com o servidor. ' + msg.replace('NETWORK:', ''));
          return;
        }
        if (msg.startsWith('BAD_RESPONSE:')) {
          showFormError('Servidor não devolveu JSON. Ligue Apache e MySQL no XAMPP. ' + msg.replace('BAD_RESPONSE:', ''));
          return;
        }
        showFormError('Não foi possível concluir o login. ' + (msg || ('Confira Apache/MySQL e acesse ' + base)));
      }
    }

    function reiniciarEcoCheckNaTelaAuth() {
      if (window.EcoCheckBridge && typeof window.EcoCheckBridge.reset === 'function') {
        window.EcoCheckBridge.reset();
      } else if (window.EcoCheck && typeof window.EcoCheck.clearToken === 'function') {
        window.EcoCheck.clearToken();
        document.dispatchEvent(new CustomEvent('ecocheck:reset'));
      }
    }

    async function verificarServidorAoCarregar() {
      const pingUrl = obterUrlServidor('ecocheck-api.php') || (obterBaseApp() + 'api/ecocheck-api.php');
      try {
        const r = await fetch(pingUrl + '?action=status', { credentials: 'same-origin', cache: 'no-store' });
        if (!r.ok) {
          showFormError('Servidor respondeu com erro ' + r.status + '. Rode INICIAR-PROJETO.bat e, se o MySQL falhar, REPARAR-MYSQL.bat.');
        }
      } catch (e) {
        showFormError('Apache parece desligado. Execute INICIAR-PROJETO.bat e acesse ' + obterBaseApp());
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      reiniciarEcoCheckNaTelaAuth();
      verificarServidorAoCarregar();
      const params = new URLSearchParams(window.location.search);
      const prefilledEmail = params.get('email');
      const emailInput = document.getElementById('loginEmail');
      if (prefilledEmail && emailInput) {
        emailInput.value = prefilledEmail;
      }
      if (params.get('registered') === '1') {
        const hint = document.getElementById('cadastroOkHint');
        if (hint) {
          hint.style.display = 'block';
          hint.textContent = 'Conta criada com sucesso! Entre com seu e-mail e senha.';
        }
      }
    });
  </script>
</body>
</html>
