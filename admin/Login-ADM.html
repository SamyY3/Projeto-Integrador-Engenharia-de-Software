<!DOCTYPE html>
<html lang="pt-BR" class="login-adm-view">
<head>
  <base href="../" data-app-base>
  <script>(function(){var p=location.pathname.replace(/\\/g,"/"),b=document.querySelector("base[data-app-base]"),m=p.match(/^(.*\/)(?:auth|admin|pages|mapa)\/[^/]+$/);if(b)b.href=m?m[1]:p.replace(/\/[^/]*$/,"/")||"/";})();</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="admin/plat-adm-theme-boot.js?v=2"></script>
  <title>Login ADM Plataforma | EcoColeta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin/Login-ADM.css?v=20">
  <link rel="stylesheet" href="admin/Login-ADM-Ecoponto.css?v=8">
  <link rel="stylesheet" href="assets/css/logo.css?v=11">
  <link rel="stylesheet" href="ecocheck-dist/ecocheck.css?v=6">
  <link rel="stylesheet" href="assets/css/ecocheck-widget.css?v=11">
  <script src="assets/js/ecocoleta-paths.js?v=3"></script>
  <script src="assets/js/ecocheck-bridge.js?v=13"></script>
  <script defer src="ecocheck-dist/ecocheck.iife.js?v=5"></script>
</head>
<body class="page-login-adm">
  <div class="eco-deco" aria-hidden="true">
    <svg class="eco-leaf eco-leaf--1" viewBox="0 0 64 64" fill="none">
      <path d="M32 4C18 18 8 34 12 52c8-4 14-12 20-20 6 8 12 16 20 20 4-18-6-34-20-48z" fill="currentColor"/>
      <path d="M32 32v20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    </svg>
    <svg class="eco-leaf eco-leaf--2" viewBox="0 0 64 64" fill="none">
      <path d="M32 6C14 22 6 40 10 58c10-6 16-16 22-26 6 10 12 20 22 26 4-18-4-36-22-52z" fill="currentColor"/>
    </svg>
    <svg class="eco-leaf eco-leaf--3" viewBox="0 0 64 64" fill="none">
      <path d="M32 8c-12 14-18 28-14 44 6-2 10-8 14-14 4 6 8 12 14 14 4-16-2-30-14-44z" fill="currentColor"/>
    </svg>
    <svg class="eco-leaf eco-leaf--4" viewBox="0 0 64 64" fill="none">
      <path d="M32 4C20 16 12 30 16 48c6-3 11-9 16-16 5 7 10 13 16 16 4-18-4-32-16-44z" fill="currentColor"/>
    </svg>
    <svg class="eco-leaf eco-leaf--5" viewBox="0 0 64 64" fill="none">
      <path d="M32 6C22 18 16 32 20 50c5-2 9-7 12-12 3 5 7 10 12 12 4-18-2-32-12-44z" fill="currentColor"/>
    </svg>
    <span class="eco-spark eco-spark--1"></span>
    <span class="eco-spark eco-spark--2"></span>
    <span class="eco-spark eco-spark--3"></span>
  </div>

  <main class="eco-premium-page">
    <header class="eco-premium-top eco-premium-top--plat">
      <a href="pages/tela-inicia.html" class="eco-premium-brand">
        <img class="eco-brand-img" src="assets/images/logo.2.png?v=5" alt="EcoColeta" width="192" height="84" decoding="async">
      </a>
    </header>

    <section class="eco-login-card" aria-label="Login administrador da plataforma">
      <div class="eco-login-head">
        <h2>ADM <em>Plataforma</em></h2>
        <p>Administre a EcoColeta com credencial institucional.</p>
      </div>

      <form id="platLoginForm" novalidate>
        <label class="eco-field" for="platEmail">
          <span>E-mail institucional</span>
          <input id="platEmail" name="email" type="email" placeholder="admin.plataforma@ecocoleta.local" autocomplete="email" required>
          <small id="platEmailError"></small>
        </label>

        <label class="eco-field" for="platPassword">
          <span>Senha</span>
          <div class="eco-password">
            <input id="platPassword" name="senha" type="password" placeholder="Sua senha segura" autocomplete="current-password" required>
            <button type="button" id="togglePlatPassword" aria-label="Mostrar senha">👁</button>
          </div>
          <small id="platPasswordError"></small>
        </label>

        <div class="ecocheck-widget">
          <button type="button" class="ecocheck-trigger is-idle" data-ecocheck-open aria-label="Abrir verificação EcoCheck">
            <span class="ecocheck-trigger__main">
              <span class="ecocheck-trigger__icon" data-ecocheck-icon aria-hidden="true">
                <svg class="ecocheck-icon ecocheck-icon--loading" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <circle cx="12" cy="12" r="8.5" stroke="#c5d9cc" stroke-width="2.5"/>
                  <path d="M12 3.5a8.5 8.5 0 0 1 8.5 8.5" stroke="#12895d" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <svg class="ecocheck-icon ecocheck-icon--verified" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path class="ecocheck-check-path" d="M7.2 12.3l2.8 2.7 6.8-7" stroke="#0f6b38" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <span class="ecocheck-trigger__label">Não sou um robô</span>
            </span>
            <span class="ecocheck-trigger__brand" aria-hidden="true">
              <span class="ecocheck-trigger__brand-name">EcoCheck</span>
              <span class="ecocheck-trigger__brand-tag">ANTI-BOT</span>
            </span>
          </button>
        </div>

        <p id="platFormError" class="eco-form-error" role="alert" hidden data-ecocheck-form-error></p>

        <button type="submit" class="eco-submit">Login</button>
      </form>

      <aside class="eco-demo" aria-label="Credenciais de teste no ambiente local">
        <strong>Ambiente local</strong>
        <p class="eco-demo-row"><span class="eco-demo-label">E-mail</span> <span class="eco-demo-value">admin.plataforma@ecocoleta.local</span></p>
        <p class="eco-demo-row"><span class="eco-demo-label">Senha</span> <span class="eco-demo-value">EcoPlat@2026</span></p>
        <button type="button" class="eco-demo-fill" id="fillDemoPlat">Preencher credencial de teste</button>
      </aside>
    </section>

    <nav class="eco-footer-links" aria-label="Outros acessos">
      <a href="auth/login.html">Login de usuário</a>
      <a href="admin/Login-ADM-Ecoponto.html">Portal EcoPonto</a>
      <a href="pages/tela-inicia.html">Site EcoColeta</a>
    </nav>
  </main>

  <script>
    const form = document.getElementById('platLoginForm');
    const emailInput = document.getElementById('platEmail');
    const passwordInput = document.getElementById('platPassword');
    const emailError = document.getElementById('platEmailError');
    const passwordError = document.getElementById('platPasswordError');
    const formError = document.getElementById('platFormError');
    const submitBtn = form.querySelector('.eco-submit');
    const submitLabel = submitBtn.textContent;

    function clearErrors() {
      [emailInput, passwordInput].forEach((input) => input.classList.remove('input-error'));
      emailError.textContent = '';
      passwordError.textContent = '';
      if (formError) {
        formError.textContent = '';
        formError.hidden = true;
      }
    }

    function showFormError(message) {
      if (!formError) return;
      formError.textContent = message;
      formError.hidden = !message;
    }

    function parseJsonServidor(text) {
      const raw = String(text || '').replace(/^\uFEFF/, '').trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e) {
        const idx = raw.indexOf('{"');
        if (idx >= 0) return JSON.parse(raw.slice(idx));
        throw e;
      }
    }

    async function postPlatLogin(email, senha, ecocheckToken) {
      if (typeof window.ecocoletaPhpUrl !== 'function') {
        throw new Error('Recurso de caminhos não carregou (ecocoleta-paths.js). Recarregue a página.');
      }
      const endpoint = window.ecocoletaPhpUrl('Login-ADM.php');
      if (!endpoint) {
        throw new Error('Abra esta página pelo servidor (http://localhost/...), não como arquivo local.');
      }

      let response;
      try {
        response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body: new URLSearchParams({ email, senha, ecocheck_token: ecocheckToken || '' }).toString(),
          credentials: 'same-origin',
          cache: 'no-store',
        });
      } catch (e) {
        throw new Error('Não foi possível falar com o servidor. Verifique se o Apache e o MySQL estão ativos no XAMPP.');
      }

      const text = await response.text();
      let data;
      try {
        data = parseJsonServidor(text);
      } catch (e) {
        if (!response.ok) {
          throw new Error('O servidor respondeu com erro ' + response.status + '. Verifique o caminho do projeto e os logs do PHP.');
        }
        throw new Error('Resposta inesperada do servidor (não-JSON). Verifique os logs do PHP.');
      }
      if (!response.ok && !(data && data.erro)) {
        throw new Error('O servidor respondeu com erro ' + response.status + '.');
      }
      return data;
    }

    document.getElementById('fillDemoPlat').addEventListener('click', () => {
      emailInput.value = 'admin.plataforma@ecocoleta.local';
      passwordInput.value = 'EcoPlat@2026';
      clearErrors();
      emailInput.focus();
    });

    document.getElementById('togglePlatPassword').addEventListener('click', () => {
      const visible = passwordInput.type === 'text';
      passwordInput.type = visible ? 'password' : 'text';
      document.getElementById('togglePlatPassword').setAttribute(
        'aria-label',
        visible ? 'Mostrar senha' : 'Ocultar senha'
      );
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearErrors();

      const email = emailInput.value.trim();
      const senha = passwordInput.value;
      let valid = true;

      if (!email) {
        emailInput.classList.add('input-error');
        emailError.textContent = 'Informe o e-mail institucional.';
        valid = false;
      }
      if (!senha) {
        passwordInput.classList.add('input-error');
        passwordError.textContent = 'Informe a senha.';
        valid = false;
      }
      if (!valid) return;

      let ecocheckToken = '';
      if (window.EcoCheck && typeof window.EcoCheck.ensureVerified === 'function') {
        const verified = await window.EcoCheck.ensureVerified();
        if (!verified.ok) {
          showFormError(verified.erro || 'Conclua a verificação EcoCheck.');
          if (window.EcoCheckBridge) window.EcoCheckBridge.updateStatus();
          return;
        }
        ecocheckToken = verified.token || window.EcoCheck.getToken() || '';
      } else {
        showFormError('EcoCheck não carregou. Execute ecocheck/build.bat.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Validando acesso…';

      try {
        const data = await postPlatLogin(email, senha, ecocheckToken);
        if (data && data.sucesso === true && data.admin) {
          localStorage.setItem('ecocoletaPlatAdminLoggedIn', 'true');
          localStorage.setItem('ecocoletaPlatAdminName', data.admin.nome || '');
          localStorage.setItem('ecocoletaPlatAdminEmail', data.admin.email || '');
          localStorage.setItem('ecocoletaPlatAdminCargo', data.admin.cargo || '');
          window.location.replace('admin/Home-ADM.html');
          return;
        }
        showFormError((data && data.erro) ? data.erro : 'Não foi possível autenticar.');
      } catch (error) {
        showFormError((error && error.message) ? error.message : 'Verifique se o Apache e o MySQL estão ativos no XAMPP.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = submitLabel;
      }
    });

    if (window.EcoCheckBridge && typeof window.EcoCheckBridge.reset === 'function') {
      window.EcoCheckBridge.reset();
    } else if (window.EcoCheck && typeof window.EcoCheck.clearToken === 'function') {
      window.EcoCheck.clearToken();
      document.dispatchEvent(new CustomEvent('ecocheck:reset'));
    }

    (async function redirecionarSeJaLogado() {
      try {
        const response = await fetch('admin-plataforma-session.php', {
          method: 'GET',
          credentials: 'same-origin',
          cache: 'no-store',
        });
        const data = parseJsonServidor(await response.text());
        if (data && data.sucesso === true && data.admin) {
          window.location.replace('admin/Home-ADM.html');
        }
      } catch (e) {

      }
    })();
  </script>
</body>
</html>
